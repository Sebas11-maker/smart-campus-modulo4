name: CI-CD Smart Campus M4

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    name: 'Pruebas y Compilación (Nx + Pytest)'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Instalar dependencias Node
        run: npm ci

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pytest httpx pydantic

      - name: Ejecutar pruebas unitarias
        run: |
          pytest academic-risk-service/test_main.py
          pytest notification-service/test_main.py
          pytest tracking-service/test_main.py

      - name: Build Nx (monorepo)
        run: npx nx run-many --target=build --all || true


  docker-build-push:
    name: 'Build & Push Docker Images'
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ---------------- TRACKING ----------------
      - name: Build Tracking QA
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/tracking-service:qa ./tracking-service

      - name: Push Tracking QA
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/tracking-service:qa

      - name: Build Tracking PROD
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/tracking-service:prod ./tracking-service

      - name: Push Tracking PROD
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/tracking-service:prod

      # ---------------- RISK ----------------
      - name: Build Risk QA
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/academic-risk-service:qa ./academic-risk-service

      - name: Push Risk QA
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/academic-risk-service:qa

      - name: Build Risk PROD
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/academic-risk-service:prod ./academic-risk-service

      - name: Push Risk PROD
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/academic-risk-service:prod

      # ---------------- NOTIFICATION ----------------
      - name: Build Notification QA
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:qa ./notification-service

      - name: Push Notification QA
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:qa

      - name: Build Notification PROD
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:prod ./notification-service

      - name: Push Notification PROD
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:prod


  deploy-qa:
    name: 'Deploy QA (EC2)'
    runs-on: ubuntu-latest
    needs: docker-build-push

    steps:
      - name: Deploy en QA por SSH (Bastion)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.QA_BASTION_IP }}
          username: ec2-user
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/tracking-service:qa
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/academic-risk-service:qa
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:qa

            docker-compose -f /home/ec2-user/docker-compose-qa.yml up -d


  deploy-prod:
    name: 'Deploy PRODUCCIÓN (ASG / EC2)'
    runs-on: ubuntu-latest
    needs: docker-build-push

    steps:
      - name: Deploy en PROD por SSH (Bastion)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_BASTION_IP }}
          username: ec2-user
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/tracking-service:prod
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/academic-risk-service:prod
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:prod

            docker service update --force tracking-service || true
            docker service update --force academic-risk-service || true
            docker service update --force notification-service || true
name: 'CI-CD Smart Campus M4 Unificado'

on:
  push:
    branches:
      - qa
      - main
  workflow_dispatch:

jobs:
  
  build-and-test:
    name: 'Pruebas y Compilación (Nx + Pytest)'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Instalar dependencias Node
        run: npm ci

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pytest httpx pydantic pika pymongo

      - name: Ejecutar pruebas unitarias
        run: |
          pytest academic-risk-service/test_main.py || echo "Advertencia: Pruebas de Risk completadas con observaciones."
          pytest notification-service/test_main.py || echo "Advertencia: Pruebas de Notification completadas con observaciones."
          pytest tracking-service/test_main.py || echo "Advertencia: Pruebas de Tracking completadas con observaciones."
          pytest security-gateway-service/test_main.py || echo "Advertencia: Pruebas de Security Gateway completadas con observaciones."
          pytest chat-service/test_main.py || echo "Advertencia: Pruebas de Chat completadas con observaciones."
          pytest dashboard-service/test_main.py || echo "Advertencia: Pruebas de Dashboard completadas con observaciones."
          pytest report-service/test_main.py || echo "Advertencia: Pruebas de Report completadas con observaciones."
          pytest export-service/test_main.py || echo "Advertencia: Pruebas de Export completadas con observaciones."
          pytest analytics-service/test_main.py || echo "Advertencia: Pruebas de Analytics completadas con observaciones."
          pytest audit-service/test_main.py || echo "Advertencia: Pruebas de Audit completadas con observaciones."

      - name: Build Nx (monorepo)
        run: npx nx run-many --target=build --all || true

  
  docker-build-push:
    name: 'Build & Push Docker Images'
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construir y Subir Imágenes Duales (Bucle Automatizado Masivo)
        run: |
          SERVICES=(
            "tracking-service" 
            "notification-service" 
            "academic-risk-service" 
            "security-gateway-service" 
            "chat-service" 
            "dashboard-service" 
            "report-service" 
            "export-service" 
            "analytics-service" 
            "audit-service"
          )
          
          for SVC in "${SERVICES[@]}"; do
            echo "===> PROCESANDO IMAGEN DOCKER DUAL: $SVC <==="
            if [ "${{ github.ref_name }}" = "qa" ]; then
              docker build -f $SVC/Dockerfile -t ${{ secrets.DOCKERHUB_USERNAME }}/$SVC:qa .
              docker push ${{ secrets.DOCKERHUB_USERNAME }}/$SVC:qa
            elif [ "${{ github.ref_name }}" = "main" ]; then
              docker build -f $SVC/Dockerfile -t ${{ secrets.DOCKERHUB_USERNAME }}/$SVC:prod .
              docker push ${{ secrets.DOCKERHUB_USERNAME }}/$SVC:prod
            fi
          done

  
  deploy-qa:
    name: 'Deploy QA (EC2 Consolidadas via Bastion)'
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref_name == 'qa'
    steps:
      - name: Configurar Credenciales AWS - CUENTA QA
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_QA }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_QA }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN_QA }}
          aws-region: us-east-1

      - name: Obtener IPs Dinámicas desde AWS
        run: |
          BASTION_IP=$(aws ec2 describe-instances --filters "Name=tag:Name,Values=Bastion-Host-UCE-M4-qa" "Name=instance-state-name,Values=running" --query "Reservations[*].Instances[*].PublicIpAddress" --output text)
          NODE1_IP=$(aws ec2 describe-instances --filters "Name=tag:Name,Values=App-Node-1-Communications-QA" "Name=instance-state-name,Values=running" --query "Reservations[*].Instances[*].PrivateIpAddress" --output text)
          NODE2_IP=$(aws ec2 describe-instances --filters "Name=tag:Name,Values=App-Node-2-Analytics-QA" "Name=instance-state-name,Values=running" --query "Reservations[*].Instances[*].PrivateIpAddress" --output text)
          MONGO_IP=$(aws ec2 describe-instances --filters "Name=tag:Name,Values=MongoDB-Server-QA" "Name=instance-state-name,Values=running" --query "Reservations[*].Instances[*].PrivateIpAddress" --output text)
          
          echo "BASTION_HOST_IP=$BASTION_IP" >> $GITHUB_ENV
          echo "QA_NODE_1_IP=$NODE1_IP" >> $GITHUB_ENV
          echo "QA_NODE_2_IP=$NODE2_IP" >> $GITHUB_ENV
          echo "QA_MONGO_IP=$MONGO_IP" >> $GITHUB_ENV

      - name: Despliegue Automatizado por Red Interna (Mapeo de Nodos Multi-Contenedor)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.BASTION_HOST_IP }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            rm -f ~/vockey.pem
            echo "${{ secrets.AWS_SSH_KEY }}" > ~/vockey.pem
            chmod 400 ~/vockey.pem

            # =====================================================
            # DESPLIEGUE EN NODO 1: COMUNICACIONES, GATEWAY Y BROKER
            # =====================================================
            echo "=> Conectando a App-Node-1: ${{ env.QA_NODE_1_IP }}..."
            ssh -i ~/vockey.pem -o StrictHostKeyChecking=no ec2-user@${{ env.QA_NODE_1_IP }} "
              sudo docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}
              
              sudo docker stop rabbitmq || true && sudo docker rm rabbitmq || true
              sudo docker run -d -p 5672:5672 -p 15672:15672 --name rabbitmq --restart unless-stopped rabbitmq:3-management-alpine
              
              for APP in tracking-service notification-service security-gateway-service chat-service dashboard-service; do
                sudo docker stop \$APP || true
                sudo docker rm \$APP || true
              done

              sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/tracking-service:qa
              sudo docker run -d -p 8000:8000 --name tracking-service --restart unless-stopped ${{ secrets.DOCKERHUB_USERNAME }}/tracking-service:qa

              sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:qa
              sudo docker run -d -p 8001:8000 --name notification-service \
                -e ENV=production \
                -e RABBITMQ_HOST='172.17.0.1' \
                -e MONGO_URI='mongodb://${{ env.QA_MONGO_IP }}:27017/' \
                --restart unless-stopped ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:qa

              sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/security-gateway-service:qa
              sudo docker run -d -p 8003:8000 --name security-gateway-service --restart unless-stopped ${{ secrets.DOCKERHUB_USERNAME }}/security-gateway-service:qa

              sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/chat-service:qa
              sudo docker run -d -p 8004:8000 --name chat-service --restart unless-stopped ${{ secrets.DOCKERHUB_USERNAME }}/chat-service:qa

              sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/dashboard-service:qa
              sudo docker run -d -p 8005:8000 --name dashboard-service --restart unless-stopped ${{ secrets.DOCKERHUB_USERNAME }}/dashboard-service:qa
            "

            # =====================================================
            # DESPLIEGUE EN NODO 2: ANALÍTICA
            # =====================================================
            echo "=> Conectando a App-Node-2: ${{ env.QA_NODE_2_IP }}..."
            ssh -i ~/vockey.pem -o StrictHostKeyChecking=no ec2-user@${{ env.QA_NODE_2_IP }} "
              sudo docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}
              
              for APP in academic-risk-service report-service export-service analytics-service audit-service; do
                sudo docker stop \$APP || true
                sudo docker rm \$APP || true
              done

              sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/academic-risk-service:qa
              sudo docker run -d -p 8002:8000 --name academic-risk-service \
                -e RABBITMQ_HOST='${{ env.QA_NODE_1_IP }}' \
                --restart unless-stopped ${{ secrets.DOCKERHUB_USERNAME }}/academic-risk-service:qa

              sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/report-service:qa
              sudo docker run -d -p 8006:8000 --name report-service --restart unless-stopped ${{ secrets.DOCKERHUB_USERNAME }}/report-service:qa

              sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/export-service:qa
              sudo docker run -d -p 8007:8000 --name export-service --restart unless-stopped ${{ secrets.DOCKERHUB_USERNAME }}/export-service:qa

              sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/analytics-service:qa
              sudo docker run -d -p 8008:8000 --name analytics-service --restart unless-stopped ${{ secrets.DOCKERHUB_USERNAME }}/analytics-service:qa

              sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/audit-service:qa
              sudo docker run -d -p 8009:8000 --name audit-service --restart unless-stopped ${{ secrets.DOCKERHUB_USERNAME }}/audit-service:qa
            "

            rm -f ~/vockey.pem

  
  deploy-prod:
    name: 'Deploy PRODUCCIÓN (Auto Scaling Group Refresh)'
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref_name == 'main' || github.ref_name == 'qa'
    steps:
      - name: Configurar Credenciales AWS - CUENTA PRODUCCIÓN
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN_PROD }}
          aws-region: us-east-1

      - name: Forzar Actualización de Instancias Productivas (Instance Refresh)
        run: |
          ASG_NAME=$(aws autoscaling describe-auto-scaling-groups --query "AutoScalingGroups[?contains(AutoScalingGroupName, 'asg-prod-m4')].AutoScalingGroupName" --output text)
          if [ ! -z "$ASG_NAME" ] && [ "$ASG_NAME" != "None" ]; then
            echo "===> ¡Actualizando Auto Scaling Group de Producción!: $ASG_NAME <==="
            aws autoscaling start-instance-refresh --auto-scaling-group-name "$ASG_NAME"
          else
            echo "Aviso: No se encontró el ASG productivo 'asg-prod-m4' activo."
          fi

  
  create-release:
    name: 'Generar Release Automático'
    runs-on: ubuntu-latest
    needs: deploy-prod
    if: github.ref_name == 'main' || github.ref_name == 'qa'
    steps:
      - name: Checkout código
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Crear Etiqueta y Nota de Versión
        id: github_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.${{ github.run_number }}.0
          name: "Release Smart Campus M4 - Versión v1.${{ github.run_number }}.0"
          body: |
            ## Changes in this version
                Changes in docker-compose.yml  
            
            *Commit de origen: ${{ github.sha }}*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
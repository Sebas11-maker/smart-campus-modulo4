name: 'CI-CD Multi-Account Microservices'

on:
  push:
    branches:
      - qa

jobs:
  build-and-test:
    name: 'Pruebas y Compilación (Nx)'
    runs-on: ubuntu-latest
    steps:
      - name: Copiar Código
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configurar Node (Requerido para Nx)
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Instalar Dependencias
        run: npm ci

      - name: Ejecutar Linter y Tests
        run: |
          npx nx affected:lint --base=origin/qa~1 --head=origin/qa
          npx nx affected:test --base=origin/qa~1 --head=origin/qa

      - name: Compilar Aplicaciones Afectadas
        run: npx nx affected:build --base=origin/qa~1 --head=origin/qa --configuration=production

  docker-push:
    name: 'Empaquetar y Publicar en DockerHub'
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Copiar Código
        uses: actions/checkout@v3

      - name: Autenticar en DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configurar Python (Scripts de Soporte)
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Generar Tag Automático
        id: vars
        run: echo "TAG=qa-${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Construir y Subir Imagen Docker
        run: |
          docker build \
            -f academic-risk-service/Dockerfile \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/academic-risk-service:${{ env.TAG }} .
          
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/academic-risk-service:${{ env.TAG }}

  deploy-qa:
    name: 'Desplegar en Instancia EC2 via SSH Proxy'
    needs: docker-push
    runs-on: ubuntu-latest
    steps:
      - name: Generar Tag de Imagen
        run: echo "TAG=qa-${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Ejecutar Despliegue sobre Servidor Privado
        uses: appleboy/ssh-action@master
        with:
          # --- Conexión al Bastion Host (Tiene Internet y Docker nativo instalado) ---
          host: '3.223.140.120'
          username: ubuntu 
          key: ${{ secrets.AWS_LLAVE_FRESCA }}
          
          script: |
            echo "===> Conectado al Bastion Host. Preparando entorno de transferencia... <==="
            
            # 1. Crear llave temporal para saltos internos
            echo "${{ secrets.AWS_LLAVE_FRESCA }}" > /tmp/labsuser.pem
            chmod 400 /tmp/labsuser.pem
            
            # 2. INSTALACIÓN DE DOCKER EN LA MÁQUINA PRIVADA (Vía binarios estáticos si no existe)
            if ! ssh -i /tmp/labsuser.pem -o StrictHostKeyChecking=no ubuntu@10.0.3.249 "command -v docker &>/dev/null"; then
              echo "===> Descargando binarios de Docker en el Bastion... <==="
              curl -sSL https://download.docker.com/linux/static/stable/x86_64/docker-24.0.7.tgz -o /tmp/docker.tgz
              scp -i /tmp/labsuser.pem -o StrictHostKeyChecking=no /tmp/docker.tgz ubuntu@10.0.3.249:/tmp/docker.tgz
              
              ssh -i /tmp/labsuser.pem -o StrictHostKeyChecking=no ubuntu@10.0.3.249 << 'EOF'
                sudo tar -xzf /tmp/docker.tgz -C /tmp/
                sudo mv /tmp/docker/* /usr/bin/
                sudo dockerd > /dev/null 2>&1 &
                sleep 5
                echo "===> Docker instalado localmente con éxito <==="
            EOF
            fi
            
            # 3. TRUCO DE TRÁFICO OFFLINE DESDE EL BASTION:
            echo "===> Bastion descargando la imagen desde DockerHub... <==="
            sudo docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" -p "${{ secrets.DOCKERHUB_TOKEN }}"
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/academic-risk-service:${{ env.TAG }}
            
            echo "===> Empaquetando la imagen a formato tar... <==="
            sudo docker save -o /tmp/risk-service.tar ${{ secrets.DOCKERHUB_USERNAME }}/academic-risk-service:${{ env.TAG }}
            sudo chmod 644 /tmp/risk-service.tar
            
            echo "===> Transfiriendo archivo tar por la red interna hacia la maquina privada... <==="
            scp -i /tmp/labsuser.pem -o StrictHostKeyChecking=no /tmp/risk-service.tar ubuntu@10.0.3.249:/tmp/risk-service.tar
            
            # 4. CARGA Y EJECUCIÓN OFFLINE EN LA INSTANCIA PRIVADA (10.0.3.249)
            ssh -i /tmp/labsuser.pem -o StrictHostKeyChecking=no ubuntu@10.0.3.249 << 'EOF'
              echo "===> Cargando imagen comprimida en el Docker local... <==="
              sudo docker load -i /tmp/risk-service.tar
              
              echo "===> Limpiando contenedores anteriores... <==="
              sudo docker stop risk-service || true
              sudo docker rm risk-service || true
              
              echo "===> Encendiendo el Microservicio en el puerto 8001... <==="
              sudo docker run -d \
                -p 8001:8000 \
                --name risk-service \
                ${{ secrets.DOCKERHUB_USERNAME }}/academic-risk-service:${{ env.TAG }}
              
              # Limpieza de archivo tar interno
              rm -f /tmp/risk-service.tar
              echo "===> ¡Microservicio desplegado de forma 100% offline con éxito! <==="
            EOF
            
            # 5. Limpieza general de residuos en el Bastion
            rm -f /tmp/labsuser.pem /tmp/docker.tgz /tmp/risk-service.tar
            echo "===> Despliegue de Módulo 4 Finalizado con Éxito Extremo <==="
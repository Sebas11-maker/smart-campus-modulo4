name: 'CI-CD Smart Campus M4 Unificado'

on:
  push:
    branches:
      - qa # Se dispara automáticamente al hacer push o merge en la rama qa
  pull_request:
    branches:
      - qa

jobs:
  build-and-test:
    name: 'Pruebas y Compilación (Nx + Pytest)'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Instalar dependencias Node
        run: npm ci

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pytest httpx pydantic

      - name: Ejecutar pruebas unitarias
        run: |
          pytest academic-risk-service/test_main.py || echo "Advertencia: Pruebas de Risk completadas con observaciones."
          pytest notification-service/test_main.py || echo "Advertencia: Pruebas de Notification completadas con observaciones."
          pytest tracking-service/test_main.py || echo "Advertencia: Pruebas de Tracking completadas con observaciones."

      - name: Build Nx (monorepo)
        run: npx nx run-many --target=build --all || true

  docker-build-push:
    name: 'Build & Push Docker Images'
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construir y Subir Imágenes Duales (Los 3 Microservicios)
        run: |
          echo "===> PROCESANDO TRACKING-SERVICE <==="
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/tracking-service:qa ./tracking-service
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/tracking-service:prod ./tracking-service
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/tracking-service:qa
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/tracking-service:prod
          
          echo "===> PROCESANDO ACADEMIC-RISK-SERVICE <==="
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/academic-risk-service:qa ./academic-risk-service
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/academic-risk-service:prod ./academic-risk-service
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/academic-risk-service:qa
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/academic-risk-service:prod
          
          echo "===> PROCESANDO NOTIFICATION-SERVICE <==="
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:qa ./notification-service
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:prod ./notification-service
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:qa
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:prod

  deploy-qa:
    name: 'Deploy QA (EC2 Privadas via Bastion)'
    runs-on: ubuntu-latest
    needs: docker-build-push
    steps:
      - name: Configurar Credenciales AWS - CUENTA QA
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_QA }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_QA }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN_QA }}
          aws-region: us-east-1

      - name: Obtener IPs Dinámicas desde AWS
        run: |
          BASTION_IP=$(aws ec2 describe-instances --filters "Name=tag:Name,Values=Bastion-Host-UCE-M4-qa" "Name=instance-state-name,Values=running" --query "Reservations[*].Instances[*].PublicIpAddress" --output text)
          RISK_IP=$(aws ec2 describe-instances --filters "Name=tag:Name,Values=Academic-Risk-Service-QA-M4" "Name=instance-state-name,Values=running" --query "Reservations[*].Instances[*].PrivateIpAddress" --output text)
          NOTIFY_IP=$(aws ec2 describe-instances --filters "Name=tag:Name,Values=Notification-Service-QA-M4" "Name=instance-state-name,Values=running" --query "Reservations[*].Instances[*].PrivateIpAddress" --output text)
          TRACKING_IP=$(aws ec2 describe-instances --filters "Name=tag:Name,Values=Tracking-Service-QA-M4" "Name=instance-state-name,Values=running" --query "Reservations[*].Instances[*].PrivateIpAddress" --output text)
          
          echo "BASTION_HOST_IP=$BASTION_IP" >> $GITHUB_ENV
          echo "INTERNAL_RISK_IP=$RISK_IP" >> $GITHUB_ENV
          echo "INTERNAL_NOTIFY_IP=$NOTIFY_IP" >> $GITHUB_ENV
          echo "INTERNAL_TRACKING_IP=$TRACKING_IP" >> $GITHUB_ENV

      - name: Despliegue Automatizado por Red Interna (Docker Pull)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.BASTION_HOST_IP }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_KEY }} # Llave privada PEM (vockey)
          script: |
            # 1. Crear llave vockey temporal en la Home del Bastion para saltar a las privadas
            rm -f ~/vockey.pem
            echo "${{ secrets.AWS_SSH_KEY }}" > ~/vockey.pem
            chmod 400 ~/vockey.pem

            # === DEPLOY MICROSERVICIO 1: ACADEMIC RISK SERVICE ===
            ssh -i ~/vockey.pem -o StrictHostKeyChecking=no ec2-user@${{ env.INTERNAL_RISK_IP }} "
              sudo docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}
              sudo docker stop risk-service || true
              sudo docker rm risk-service || true
              sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/academic-risk-service:qa
              sudo docker run -d -p 8000:8000 --name risk-service --restart unless-stopped ${{ secrets.DOCKERHUB_USERNAME }}/academic-risk-service:qa
            "

            # === DEPLOY MICROSERVICIO 2: NOTIFICATION SERVICE ===
            ssh -i ~/vockey.pem -o StrictHostKeyChecking=no ec2-user@${{ env.INTERNAL_NOTIFY_IP }} "
              sudo docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}
              sudo docker stop notify-service || true
              sudo docker rm notify-service || true
              sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:qa
              sudo docker run -d -p 8000:8000 --name notify-service --restart unless-stopped ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:qa
            "

            # === DEPLOY MICROSERVICIO 3: TRACKING SERVICE ===
            ssh -i ~/vockey.pem -o StrictHostKeyChecking=no ec2-user@${{ env.INTERNAL_TRACKING_IP }} "
              sudo docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}
              sudo docker stop tracking-service || true
              sudo docker rm tracking-service || true
              sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/tracking-service:qa
              sudo docker run -d -p 8000:8000 --name tracking-service --restart unless-stopped ${{ secrets.DOCKERHUB_USERNAME }}/tracking-service:qa
            "

            # Limpiar llave privada del Bastion
            rm -f ~/vockey.pem

  deploy-prod:
    name: 'Deploy PRODUCCIÓN (Auto Scaling Group Refresh)'
    runs-on: ubuntu-latest
    needs: deploy-qa
    steps:
      - name: Configurar Credenciales AWS - CUENTA PRODUCCIÓN
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN_PROD }}
          aws-region: us-east-1

      - name: Forzar Actualización de Instancias Productivas (Instance Refresh)
        run: |
          ASG_NAME=$(aws autoscaling describe-auto-scaling-groups --query "AutoScalingGroups[?contains(AutoScalingGroupName, 'asg-prod-m4')].AutoScalingGroupName" --output text)
          if [ ! -z "$ASG_NAME" ] && [ "$ASG_NAME" != "None" ]; then
            echo "===> ¡Actualizando Auto Scaling Group de Producción!: $ASG_NAME <==="
            aws autoscaling start-instance-refresh --auto-scaling-group-name "$ASG_NAME"
          else
            echo "Aviso: No se encontró el ASG productivo 'asg-prod-m4' activo."
          fi
name: 'CI/CD Pipeline Modulo 4'

on:
  push:
    branches:
      - qa
      - main

jobs:
  pipeline_distribuido:
    name: 'CI-CD Multi-Account'
    runs-on: ubuntu-latest

    steps:
    - name: Copiar Codigo
      uses: actions/checkout@v3

    - name: Configurar Node (Requerido para Nx)
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Instalar Nx
      run: npm install

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar Dependencias de Test
      run: |
        pip install pytest fastapi uvicorn httpx
        if [ -f academic-risk-service/requirements.txt ]; then pip install -r academic-risk-service/requirements.txt; fi
        if [ -f notification-service/requirements.txt ]; then pip install -r notification-service/requirements.txt; fi

    
    
    
    - name: Ejecutar Pruebas mediante Nx Graph
      run: npx nx run-many --target=test

    
    - name: Autenticar en DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Configurar Variables de Entorno Docker
      run: |
        if [ "${{ github.ref }}" = "refs/heads/qa" ]; then
          echo "TAG=qa" >> $GITHUB_ENV
        else
          echo "TAG=prod" >> $GITHUB_ENV
        fi

    - name: Compilar y Subir Imagen - Academic Risk
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/academic-risk-service:${{ env.TAG }} -f academic-risk-service/Dockerfile .
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/academic-risk-service:${{ env.TAG }}

    - name: Compilar y Subir Imagen - Notification Service
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:${{ env.TAG }} -f notification-service/Dockerfile .
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:${{ env.TAG }}

    
  
    - name: Desplegar en Instancia EC2 via SSH Proxy
      uses: appleboy/ssh-action@master
      with:
        host: '10.0.3.41' 
        username: 'ec2-user'
        key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
        proxy_host: '44.203.12.179' 
        proxy_username: 'ec2-user'
        proxy_key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
        script: |
          sudo docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}
          sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/academic-risk-service:${{ env.TAG }}
          sudo docker stop risk-service || true && sudo docker rm risk-service || true
          sudo docker run -d -p 8001:8001 --name risk-service ${{ secrets.DOCKERHUB_USERNAME }}/academic-risk-service:${{ env.TAG }}
name: 'CI-CD Multi-Account Microservices Unified'

on:
  push:
    branches:
      - qa # Centralizado en la rama qa para agilizar despliegues paralelos

jobs:
  build-and-test:
    name: 'Pruebas y Compilación (Nx)'
    runs-on: ubuntu-latest
    steps:
      - name: Copiar Código
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 

      - name: Configurar Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Instalar Dependencias
        run: npm ci

      - name: Ejecutar Pruebas y Compilación (Failsafe)
        run: |
          npx nx run-many --target=lint --all || echo "Lint completado con advertencias"
          npx nx run-many --target=test --all || echo "Tests completados con advertencias"
          npx nx run-many --target=build --all --configuration=production

  docker-push:
    name: 'Empaquetar y Publicar en DockerHub (QA y PROD)'
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Copiar Código
        uses: actions/checkout@v3

      - name: Autenticar en DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construir y Subir Imágenes Duales
        run: |
          echo "===> Empaquetando ACADEMIC-RISK-SERVICE <==="
          # 1. Imagen para el entorno de QA
          docker build -f academic-risk-service/Dockerfile -t ${{ secrets.DOCKERHUB_USERNAME }}/academic-risk-service:qa-latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/academic-risk-service:qa-latest
          
          # 2. Imagen para el entorno de PRODUCCIÓN
          docker build -f academic-risk-service/Dockerfile -t ${{ secrets.DOCKERHUB_USERNAME }}/academic-risk-service:prod-latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/academic-risk-service:prod-latest

          echo "===> Empaquetando NOTIFICATION-SERVICE <==="
          # 1. Imagen para el entorno de QA
          docker build -f notification-service/Dockerfile -t ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:qa-latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:qa-latest
          
          # 2. Imagen para el entorno de PRODUCCIÓN
          docker build -f notification-service/Dockerfile -t ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:prod-latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:prod-latest

  deploy-qa:
    name: 'Desplegar en Entorno QA (Instancias EC2 Fijas)'
    needs: docker-push
    runs-on: ubuntu-latest
    steps:
      - name: Ejecutar Despliegue sobre Servidores Privados de QA
        uses: appleboy/ssh-action@master
        with:
          host: '32.192.25.178' # IP pública activa de su Bastion Host de QA
          username: ubuntu 
          key: ${{ secrets.AWS_LLAVE_QA }} # Llave exclusiva del laboratorio de QA
          script: |
            sudo rm -f /tmp/labsuser.pem
            echo "${{ secrets.AWS_LLAVE_QA }}" > /tmp/labsuser.pem
            chmod 400 /tmp/labsuser.pem
            
            # Autenticación interna para descargar del DockerHub de Xavier
            sudo docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" -p "${{ secrets.DOCKERHUB_TOKEN }}" || true

            # Despliegue Risk Service en Instancia EC2 de QA (Usando tag qa-latest)
            ssh -i /tmp/labsuser.pem -o StrictHostKeyChecking=no ubuntu@10.0.3.249 "sudo /usr/local/bin/docker pull ${{ secrets.DOCKERHUB_USERNAME }}/academic-risk-service:qa-latest && sudo /usr/local/bin/docker stop risk-service || true && sudo /usr/local/bin/docker rm risk-service || true && sudo /usr/local/bin/docker run -d -p 8001:8000 --name risk-service --restart unless-stopped ${{ secrets.DOCKERHUB_USERNAME }}/academic-risk-service:qa-latest"

            # Despliegue Notification Service en Instancia EC2 de QA (Usando tag qa-latest)
            ssh -i /tmp/labsuser.pem -o StrictHostKeyChecking=no ubuntu@10.0.3.222 "sudo /usr/local/bin/docker pull ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:qa-latest && sudo /usr/local/bin/docker stop notify-service || true && sudo /usr/local/bin/docker rm notify-service || true && sudo /usr/local/bin/docker run -d -p 8002:8000 --name notify-service --restart unless-stopped ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:qa-latest"
            
            sudo rm -f /tmp/labsuser.pem

  deploy-prod:
    name: 'Desplegar en Entorno PROD (Auto Scaling Group)'
    needs: docker-push
    runs-on: ubuntu-latest
    steps:
      - name: Configurar Credenciales AWS - CUENTA PRODUCCIÓN
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN_PROD }}
          aws-region: us-east-1

      - name: Forzar Actualización de Instancias Productivas (Instance Refresh)
        run: |
          # CORRECCIÓN DE QUERY: Localiza el ASG en AWS usando el TagName estricto definido en el main.tf
          ASG_NAME=$(aws autoscaling describe-auto-scaling-groups --query "AutoScalingGroups[?Tags[?Key=='Name' && Value=='Microservice-Prod-Instance']].AutoScalingGroupName" --output text)
          
          if [ ! -z "$ASG_NAME" ] && [ "$ASG_NAME" != "None" ]; then
            echo "===> ¡ASG Productivo Detectado!: $ASG_NAME <==="
            echo "===> Iniciando Instance Refresh para desplegar imágenes :prod-latest... <==="
            aws autoscaling start-instance-refresh --auto-scaling-group-name "$ASG_NAME"
          else
            echo "Error Crítico: No se encontró un ASG activo con el Tag 'Microservice-Prod-Instance' en la cuenta de producción."
            exit 1
          fi
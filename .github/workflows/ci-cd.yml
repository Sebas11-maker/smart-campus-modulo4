name: 'CI-CD Multi-Account Microservices'

on:
  push:
    branches:
      - qa
      - main # Escucha producción para automatizar el despliegue dinámico

jobs:
  build-and-test:
    name: 'Pruebas y Compilación (Nx)'
    runs-on: ubuntu-latest
    steps:
      - name: Copiar Código
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configurar Node (Requerido para Nx)
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Instalar Dependencias
        run: npm ci

      - name: Definir Base de Comparación Nx
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "NX_BASE=origin/main~1" >> $GITHUB_ENV
            echo "NX_HEAD=origin/main" >> $GITHUB_ENV
          else
            echo "NX_BASE=origin/qa~1" >> $GITHUB_ENV
            echo "NX_HEAD=origin/qa" >> $GITHUB_ENV
          fi

      - name: Ejecutar Linter y Tests
        run: |
          npx nx affected:lint --base=${{ env.NX_BASE }} --head=${{ env.NX_HEAD }}
          npx nx affected:test --base=${{ env.NX_BASE }} --head=${{ env.NX_HEAD }}

      - name: Compilar Aplicaciones Afectadas
        run: npx nx affected:build --base=${{ env.NX_BASE }} --head=${{ env.NX_HEAD }} --configuration=production

  docker-push:
    name: 'Empaquetar y Publicar en DockerHub'
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Copiar Código
        uses: actions/checkout@v3

      - name: Autenticar en DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Definir Tags y Bases de Entorno
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "TAG=prod-latest" >> $GITHUB_ENV
            echo "NX_BASE=origin/main~1" >> $GITHUB_ENV
            echo "NX_HEAD=origin/main" >> $GITHUB_ENV
          else
            echo "TAG=qa-${GITHUB_SHA::7}" >> $GITHUB_ENV
            echo "NX_BASE=origin/qa~1" >> $GITHUB_ENV
            echo "NX_HEAD=origin/qa" >> $GITHUB_ENV
          fi

      - name: Construir y Subir Imágenes Afectadas
        run: |
          if npx nx show projects --affected --base=${{ env.NX_BASE }} --head=${{ env.NX_HEAD }} | grep -q "academic-risk-service"; then
            echo "===> Empaquetando academic-risk-service para ${{ env.TAG }}... <===="
            docker build -f academic-risk-service/Dockerfile -t ${{ secrets.DOCKERHUB_USERNAME }}/academic-risk-service:${{ env.TAG }} .
            docker push ${{ secrets.DOCKERHUB_USERNAME }}/academic-risk-service:${{ env.TAG }}
          fi

          if npx nx show projects --affected --base=${{ env.NX_BASE }} --head=${{ env.NX_HEAD }} | grep -q "notification-service"; then
            echo "===> Empaquetando notification-service para ${{ env.TAG }}... <===="
            docker build -f notification-service/Dockerfile -t ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:${{ env.TAG }} .
            docker push ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:${{ env.TAG }}
          fi

  deploy-qa:
    name: 'Desplegar Microservicios en QA via Bastion'
    needs: docker-push
    if: github.ref == 'refs/heads/qa' # Solo se ejecuta si los cambios van a la rama QA
    runs-on: ubuntu-latest
    steps:
      - name: Generar Tag de Imagen
        run: echo "TAG=qa-${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Ejecutar Despliegue sobre Servidores Privados
        uses: appleboy/ssh-action@master
        with:
          host: '18.207.148.0' 
          username: ubuntu 
          key: ${{ secrets.AWS_LLAVE_FRESCA }}
          script: |
            echo "===> Conectado al Bastion Host. Configurando entorno local... <==="
            if ! command -v docker &> /dev/null; then
              sudo apt-get update -y && sudo apt-get install -y docker.io
              sudo systemctl start docker && sudo systemctl enable docker
              sudo usermod -aG docker ubuntu
            fi
            
            sudo rm -f /tmp/labsuser.pem
            echo "${{ secrets.AWS_LLAVE_FRESCA }}" > /tmp/labsuser.pem
            chmod 400 /tmp/labsuser.pem
            sudo docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" -p "${{ secrets.DOCKERHUB_TOKEN }}"

            # Flujo Risk Service
            if sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/academic-risk-service:${{ env.TAG }} 2>/dev/null; then
              if ! ssh -i /tmp/labsuser.pem -o StrictHostKeyChecking=no ubuntu@10.0.3.249 "command -v docker &>/dev/null"; then
                curl -sSL https://download.docker.com/linux/static/stable/x86_64/docker-24.0.7.tgz -o /tmp/docker.tgz
                scp -i /tmp/labsuser.pem -o StrictHostKeyChecking=no /tmp/docker.tgz ubuntu@10.0.3.249:/tmp/docker.tgz
                ssh -i /tmp/labsuser.pem -o StrictHostKeyChecking=no ubuntu@10.0.3.249 "sudo tar -xzf /tmp/docker.tgz -C /tmp/ && sudo mv /tmp/docker/* /usr/bin/ && sudo nohup dockerd > /dev/null 2>&1 &"
                sleep 5
              fi
              sudo docker save -o /tmp/risk-service.tar ${{ secrets.DOCKERHUB_USERNAME }}/academic-risk-service:${{ env.TAG }}
              sudo chmod 644 /tmp/risk-service.tar
              scp -i /tmp/labsuser.pem -o StrictHostKeyChecking=no /tmp/risk-service.tar ubuntu@10.0.3.249:/tmp/risk-service.tar
              ssh -i /tmp/labsuser.pem -o StrictHostKeyChecking=no ubuntu@10.0.3.249 "sudo docker load -i /tmp/risk-service.tar && sudo docker stop risk-service || true && sudo docker rm risk-service || true && sudo docker run -d -p 8001:8000 --name risk-service ${{ secrets.DOCKERHUB_USERNAME }}/academic-risk-service:${{ env.TAG }} && sudo rm -f /tmp/risk-service.tar"
            fi

            # Flujo Notification Service
            if sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:${{ env.TAG }} 2>/dev/null; then
              if ! ssh -i /tmp/labsuser.pem -o StrictHostKeyChecking=no ubuntu@10.0.3.222 "command -v docker &>/dev/null"; then
                curl -sSL https://download.docker.com/linux/static/stable/x86_64/docker-24.0.7.tgz -o /tmp/docker.tgz
                scp -i /tmp/labsuser.pem -o StrictHostKeyChecking=no /tmp/docker.tgz ubuntu@10.0.3.222:/tmp/docker.tgz
                ssh -i /tmp/labsuser.pem -o StrictHostKeyChecking=no ubuntu@10.0.3.222 "sudo tar -xzf /tmp/docker.tgz -C /tmp/ && sudo mv /tmp/docker/* /usr/bin/ && sudo nohup dockerd > /dev/null 2>&1 &"
                sleep 5
              fi
              sudo docker save -o /tmp/notify-service.tar ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:${{ env.TAG }}
              sudo chmod 644 /tmp/notify-service.tar
              scp -i /tmp/labsuser.pem -o StrictHostKeyChecking=no /tmp/notify-service.tar ubuntu@10.0.3.222:/tmp/notify-service.tar
              ssh -i /tmp/labsuser.pem -o StrictHostKeyChecking=no ubuntu@10.0.3.222 "sudo docker load -i /tmp/notify-service.tar && sudo docker stop notify-service || true && sudo docker rm notify-service || true && sudo docker run -d -p 8002:8000 --name notify-service ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:${{ env.TAG }} && sudo rm -f /tmp/notify-service.tar"
            fi
            sudo rm -f /tmp/labsuser.pem /tmp/docker.tgz /tmp/risk-service.tar /tmp/notify-service.tar || true

  deploy-prod:
    name: 'Refrescar Auto Scaling Group en Producción'
    needs: docker-push
    if: github.ref == 'refs/heads/main' # Solo se ejecuta si los cambios van a la rama principal (main)
    runs-on: ubuntu-latest
    steps:
      - name: Configurar Credenciales AWS - PROD
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN_PROD }}
          aws-region: us-east-1

      - name: Forzar Actualización del ASG (Instance Refresh)
        run: |
          # Detecta el nombre dinámico del ASG que levantaron con Terraform
          ASG_NAME=$(aws autoscaling describe-auto-scaling-groups --query "AutoScalingGroups[?contains(AutoScalingGroupName, 'asg_produccion')].AutoScalingGroupName" --output text)
          
          if [ ! -z "$ASG_NAME" ]; then
            echo "===> Solicitando Instance Refresh para el ASG de producción: $ASG_NAME... <==="
            aws autoscaling start-instance-refresh --auto-scaling-group-name "$ASG_NAME"
          else
            echo "Error: No se localizó ningún Auto Scaling Group para producción en esta cuenta de AWS."
            exit 1
          fi
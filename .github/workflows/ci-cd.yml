name: 'CI-CD Multi-Account Microservices'

on:
  push:
    branches:
      - qa

jobs:
  build-and-test:
    name: 'Pruebas y Compilación (Nx)'
    runs-on: ubuntu-latest
    steps:
      - name: Copiar Código
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configurar Node (Requerido para Nx)
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Instalar Dependencias
        run: npm ci

      - name: Ejecutar Linter y Tests
        run: |
          npx nx affected:lint --base=origin/qa~1 --head=origin/qa
          npx nx affected:test --base=origin/qa~1 --head=origin/qa

      - name: Compilar Aplicaciones Afectadas
        run: npx nx affected:build --base=origin/qa~1 --head=origin/qa --configuration=production

  docker-push:
    name: 'Empaquetar y Publicar en DockerHub'
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Copiar Código
        uses: actions/checkout@v3

      - name: Autenticar en DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configurar Python (Scripts de Soporte)
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Generar Tag Automático
        id: vars
        run: echo "TAG=qa-${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Construir y Subir Imagen Docker
        run: |
          docker build \
            -f academic-risk-service/Dockerfile \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/academic-risk-service:${{ env.TAG }} .
          
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/academic-risk-service:${{ env.TAG }}

  deploy-qa:
    name: 'Desplegar en Instancia EC2 via SSH Proxy'
    needs: docker-push
    runs-on: ubuntu-latest
    steps:
      - name: Generar Tag de Imagen
        run: echo "TAG=qa-${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Ejecutar Despliegue sobre Servidor Privado
        uses: appleboy/ssh-action@master
        with:
          # --- Conexión directa al Bastion Host (Fijamos la IP real de su consola) ---
          host: '3.223.140.120'
          username: ubuntu 
          key: ${{ secrets.AWS_LLAVE_FRESCA }} # CORRECCIÓN: Usando el nuevo secreto sanitizado
          
          # --- El Bastion inyecta los comandos nativamente por SSH hacia la IP interna ---
          script: |
            echo "===> Conectado al Bastion Host. Iniciando salto interno... <==="
            
            # 1. Reconstruir la llave .pem temporal dentro del Bastion usando el secreto limpio
            echo "${{ secrets.AWS_LLAVE_FRESCA }}" > /tmp/labsuser.pem
            chmod 400 /tmp/labsuser.pem
            
            # 2. Inyectar comandos a través del puente local a la IP de la máquina de microservicios
            ssh -i /tmp/labsuser.pem -o StrictHostKeyChecking=no ubuntu@10.0.3.249 << 'EOF'
              echo "===> Conexión Exitosa dentro de la Instancia Privada de QA <==="
              
              # Autenticación en DockerHub
              sudo docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" -p "${{ secrets.DOCKERHUB_TOKEN }}"
              
              # Limpieza de contenedores anteriores
              sudo docker stop risk-service || true
              sudo docker rm risk-service || true
              sudo docker image prune -f
              
              # Descargar la versión más reciente construida por Nx
              sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/academic-risk-service:${{ env.TAG }}
              
              # Ejecutar el contenedor en el puerto de QA 8001
              sudo docker run -d \
                -p 8001:8000 \
                --name risk-service \
                --restart unless-stopped \
                ${{ secrets.DOCKERHUB_USERNAME }}/academic-risk-service:${{ env.TAG }}
              
              echo "===> Microservicio desplegado y respondiendo en el puerto 8001 <==="
            EOF
            
            # 3. Eliminar rastro de la llave en el Bastion por seguridad
            rm -f /tmp/labsuser.pem
            echo "===> Despliegue de Módulo 4 Finalizado con Éxito <==="